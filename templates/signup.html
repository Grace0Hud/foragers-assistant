<!Doctype HTML>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Forager's Assistant</title>
		<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
		<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
		{% include "_analytics.html" %}
	</head>
	<body>
		<h1>Forager's Assistant</h1>
		<nav>
			<a href="{{ url_for('gallery.get_gallery') }}">Gallery</a>
			
		</nav>

		<h2>Create Account</h2>

		<form action="/signup" method="POST">
			<p>
				<label>Username:</label>
				<input type="text" name="username" maxlength="64"
				       value="{{ previous_username or '' }}"
				       autocomplete="username" required>
			</p>
			<p>
				<label>Password:</label>
				<input type="password" name="password" maxlength="128"
				       autocomplete="new-password" required>
			</p>
			<p>
				<label>Confirm Password:</label>
				<input type="password" name="confirm_password" maxlength="128"
				       autocomplete="new-password" required>
			</p>
			<p>
				{% if error %}
					<div class="error-message">
						{{ error }}
					</div>
				{% endif %}
			</p>
			<button type="submit">Create Account</button>
		</form>

		<p class="auth-switch">
			Already have an account? <a href="{{ url_for('auth.signin_page') }}">Sign in</a>
		</p>
	</body>
</html>
