<!Doctype HTML>
<html>
	<head>
		<title>Forager's Assistant</title>
		<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
		<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	</head>
	<body>
		<h1>Forager's Assistant</h1>
		<nav>
			<a href="{{ url_for('gallery.get_gallery') }}">Gallery</a>
			
		</nav>

		<h2>Sign In</h2>

		<form action="/login" method="POST">
			<p>
				<label>Username:</label>
				<input type="text" name="username" maxlength="64" autocomplete="username" required>
			</p>
			<p>
				<label>Password:</label>
				<input type="password" name="password" maxlength="128" autocomplete="current-password" required>
			</p>
			<p>
				{% if error %}
					<div class="error-message">
						{{ error }}
					</div>
				{% endif %}
			</p>
			<button type="submit">Sign In</button>
		</form>

		<p style="text-align:center; color: var(--light); margin-top: -1rem;">
			Don't have an account? <a href="{{ url_for('auth.signup_page') }}" style="color: var(--secondary_light);">Create one</a>
		</p>
	</body>
</html>
