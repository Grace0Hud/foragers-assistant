<!doctype html>
<html>
  <head>
    <title>Forager's Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script defer src="{{ url_for('static', filename='frontend.js') }}"></script>
    <style>
      /* ── Active search tag pills ───────────────────────────────────────── */
      .search-tag-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        background: var(--secondary_dark);
        color: white;
        padding: 0.25rem 0.65rem;
        border-radius: 999px;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: default;
      }
      .search-tag-pill button {
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        font-size: 1rem;
        line-height: 1;
        padding: 0;
        width: auto;
        box-shadow: none;
        font-weight: 900;
      }
      .search-tag-pill button:hover {
        transform: none;
        box-shadow: none;
        color: var(--light);
      }
      #activeTags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.5rem;
        min-height: 1.5rem;
      }

      /* ── Image grid cards ─────────────────────────────────────────────── */
      .grid-card {
        position: relative;
        cursor: pointer;
        border-radius: var(--radius-md);
        overflow: hidden;
        border: 3px solid var(--primary);
        box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .grid-card:hover {
        transform: scale(1.04);
        box-shadow: 0 25px 60px rgba(0,0,0,0.35);
      }
      .grid-card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        display: block;
        border-radius: 0;
        border: none;
        box-shadow: none;
        transition: none;
      }
      .grid-card:hover img {
        transform: none;
        box-shadow: none;
      }
      .card-tag-strip {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(48,54,47,0.75);
        padding: 0.3rem 0.5rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.25rem;
      }
      .card-tag {
        background: var(--primary);
        color: white;
        font-size: 0.7rem;
        font-weight: 800;
        padding: 0.1rem 0.45rem;
        border-radius: 999px;
      }

      /* ── Detail modal ─────────────────────────────────────────────────── */
      #detailOverlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.65);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        padding: 1rem;
      }
      #detailOverlay.open {
        display: flex;
      }
      #detailPanel {
        background: white;
        border-radius: var(--radius-lg);
        box-shadow: 0 30px 80px rgba(0,0,0,0.4);
        max-width: 620px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      #detailPanel img {
        width: 100%;
        max-height: 340px;
        object-fit: cover;
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        border: none;
        box-shadow: none;
      }
      #detailPanel img:hover {
        transform: none;
        box-shadow: none;
      }
      #detailBody {
        padding: 1.4rem;
      }
      #detailBody h3 {
        color: var(--dark);
        font-size: 1.1rem;
        margin: 0 0 0.8rem;
      }
      .detail-row {
        margin-bottom: 1rem;
      }
      .detail-label {
        font-weight: 800;
        font-size: 0.85rem;
        color: var(--secondary_dark);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 0.35rem;
      }
      .detail-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }
      .detail-tag-pill {
        background: var(--primary);
        color: white;
        padding: 0.25rem 0.7rem;
        border-radius: 999px;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.1s ease;
      }
      .detail-tag-pill:hover {
        background: var(--secondary_dark);
        transform: translateY(-1px);
      }
      .detail-tag-pill.active-tag {
        background: var(--secondary_dark);
        outline: 2px solid var(--secondary_light);
      }
      .detail-location-link {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--secondary_dark);
        font-weight: 700;
        text-decoration: none;
        font-size: 0.95rem;
      }
      .detail-location-link:hover {
        color: var(--tertiary);
        text-decoration: underline;
      }
      .detail-location-text {
        font-size: 0.95rem;
        color: var(--dark);
      }
      #detailClose {
        position: absolute;
        top: 0.75rem;
        right: 0.75rem;
        background: rgba(0,0,0,0.45);
        color: white;
        border: none;
        border-radius: 999px;
        width: 2rem;
        height: 2rem;
        font-size: 1.1rem;
        font-weight: 900;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: none;
        padding: 0;
      }
      #detailClose:hover {
        background: var(--tertiary);
        transform: none;
        box-shadow: none;
      }
      #detailPanelWrap {
        position: relative;
      }
    </style>
  </head>

  <body>
    <h1>Forager's Assistant</h1>
    <nav>
      <a href="{{ url_for('start_index') }}">Home</a>
      <a href="{{ url_for('get_gallery') }}">Review Foragables</a>
      <a href="{{ url_for('logout') }}" class="nav-logout">Sign Out ({{ username }})</a>
    </nav>

    <h2>Gallery</h2>

    <form id="searchForm">
      <p>
        <label>Search by Tag:</label>
        <input id="tag_input" type="text" placeholder="Type a tag and press Enter or comma…">
      </p>
      <div id="activeTags"></div>
      <button type="submit" id="tag_search" style="margin-top:1rem;">Search</button>
    </form>

    <div id="searchStatus"></div>
    <div id="resultsGrid" class="grid"></div>

    <!-- ── Detail modal ───────────────────────────────────────────────────── -->
    <div id="detailOverlay" role="dialog" aria-modal="true" aria-label="Photo details">
      <div id="detailPanel">
        <div id="detailPanelWrap">
          <img id="detailImg" src="" alt="Selected photo">
          <button id="detailClose" aria-label="Close">&times;</button>
        </div>
        <div id="detailBody">
          <div class="detail-row" id="detailTagsRow">
            <div class="detail-label">Tags</div>
            <div class="detail-tags" id="detailTags"></div>
          </div>
          <div class="detail-row" id="detailLocationLabelRow">
            <div class="detail-label">Location Description</div>
            <div class="detail-location-text" id="detailLocationLabel"></div>
          </div>
          <div class="detail-row" id="detailCoordsRow">
            <div class="detail-label">Coordinates</div>
            <a id="detailCoordsLink" class="detail-location-link" href="#" target="_blank" rel="noopener">
              📍 <span id="detailCoordsText"></span> — Get Directions
            </a>
          </div>
          <div class="detail-row">
            <div class="detail-label">Uploaded at</div>
            <div class="detail-location-text" id="detailUploadedAt"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
